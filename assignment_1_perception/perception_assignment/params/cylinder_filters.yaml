cylinder_processor:
  ros__parameters:
    # Voxel grid
    voxel_leaf_size: 0.01

    # Box / passthrough filter thresholds (change these on the fly)
    box_filter_min_x: -0.5
    box_filter_max_x: 0.5
    box_filter_min_y: -0.5
    box_filter_max_y: 0.5
    box_filter_min_z: 0.0
    box_filter_max_z: 1.5

    # Statistical outlier removal
    stat_out_mean_k: 50
    stat_out_stddev_mul: 1.0

    # RANSAC / segmentation
    ransac_distance_threshold: 0.01
    ransac_max_iterations: 1000

    # Clustering
    cluster_tolerance: 0.02
    cluster_min_size: 100
    cluster_max_size: 25000